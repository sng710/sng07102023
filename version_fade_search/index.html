<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>רקמה אנושית אחת</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --text: #e8e0d0;
    --muted: #555;
    --gold: #b8975a;
    --gold-dim: rgba(184,151,90,0.15);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Heebo', Arial, sans-serif;
    overflow-x: hidden;
  }

  /* ── STAGE: full-screen fade show ── */
  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Floating circles container */
  #circles {
    position: absolute;
    inset: 0;
  }

  .circle-slot {
    position: absolute;
    border-radius: 50%;
    overflow: hidden;
    opacity: 0;
    transition: opacity 1.6s ease;
    border: 1px solid rgba(255,255,255,0.07);
  }

  .circle-slot.visible { opacity: 1; }

  .circle-slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(100%) contrast(1.05);
    display: block;
  }

  /* ── CENTER TEXT ── */
  .stage-center {
    position: relative;
    z-index: 10;
    text-align: center;
    pointer-events: none;
    padding: 0 20px;
  }

  /* radial dark vignette behind center text */
  .stage-center::before {
    content: '';
    position: absolute;
    inset: -80px -120px;
    background: radial-gradient(ellipse at 50% 50%, rgba(10,10,10,0.82) 30%, transparent 75%);
    z-index: -1;
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0.85;
  }

  .main-title {
    font-size: clamp(36px, 7vw, 76px);
    font-weight: 900;
    line-height: 1.08;
    color: #fff;
    letter-spacing: -0.02em;
    margin-bottom: 18px;
  }

  .title-rule {
    width: 36px;
    height: 1px;
    background: var(--gold);
    margin: 0 auto 20px;
    opacity: 0.7;
  }

  .subtitle {
    font-size: clamp(13px, 2vw, 16px);
    font-weight: 300;
    color: var(--text);
    opacity: 0.65;
    line-height: 1.7;
    max-width: 420px;
    margin: 0 auto 28px;
  }

  /* live name display */
  .live-name {
    font-size: clamp(14px, 2.2vw, 17px);
    font-weight: 400;
    color: var(--text);
    opacity: 0;
    min-height: 1.6em;
    transition: opacity 0.5s;
    letter-spacing: 0.03em;
  }

  .live-name.show { opacity: 0.75; }
  .live-name span { color: var(--gold); font-weight: 500; }

  /* count badge */
  .count-badge {
    display: inline-flex;
    align-items: baseline;
    gap: 6px;
    margin-top: 22px;
    background: var(--gold-dim);
    border: 1px solid rgba(184,151,90,0.25);
    border-radius: 100px;
    padding: 8px 20px;
    font-size: 13px;
    color: var(--gold);
    pointer-events: auto;
    cursor: pointer;
    transition: background 0.2s;
  }

  .count-badge:hover { background: rgba(184,151,90,0.24); }
  .count-badge strong { font-size: 20px; font-weight: 700; }

  /* scroll cue */
  .scroll-cue {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    animation: bob 2.6s ease-in-out infinite;
    cursor: pointer;
  }

  @keyframes bob {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(7px); }
  }

  /* ── SEARCH PANEL ── */
  #panel {
    background: var(--bg);
    padding: 60px 24px 100px;
    min-height: 100vh;
  }

  .panel-inner {
    max-width: 1200px;
    margin: 0 auto;
  }

  .panel-header {
    text-align: center;
    margin-bottom: 48px;
  }

  .panel-title {
    font-size: clamp(24px, 4vw, 40px);
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
  }

  .panel-sub {
    font-size: 14px;
    color: var(--muted);
  }

  /* search */
  .search-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }

  .search-wrap svg {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: #111;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 12px 42px 12px 16px;
    font-size: 15px;
    font-family: 'Heebo', sans-serif;
    color: var(--text);
    outline: none;
    direction: rtl;
    transition: border-color 0.2s;
  }

  #search::placeholder { color: var(--muted); }
  #search:focus { border-color: rgba(184,151,90,0.4); }

  .result-count { font-size: 13px; color: var(--muted); white-space: nowrap; }

  /* comm chips */
  .chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 36px;
  }

  .chip {
    background: transparent;
    border: 1px solid #222;
    color: var(--muted);
    padding: 6px 16px;
    border-radius: 100px;
    font-size: 12px;
    font-family: 'Heebo', sans-serif;
    cursor: pointer;
    transition: all 0.18s;
  }

  .chip:hover, .chip.active {
    background: var(--gold-dim);
    border-color: rgba(184,151,90,0.35);
    color: var(--gold);
  }

  /* grid of round portraits */
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 24px 18px;
  }

  .pcard {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }

  .pcard-img {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid transparent;
    transition: border-color 0.2s, transform 0.22s;
    background: #1a1a1a;
  }

  .pcard:hover .pcard-img {
    border-color: rgba(184,151,90,0.5);
    transform: scale(1.05);
  }

  .pcard-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: grayscale(100%) contrast(1.05);
    transition: filter 0.3s;
  }

  .pcard:hover .pcard-img img { filter: grayscale(60%); }

  .pcard-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    text-align: center;
    line-height: 1.35;
    opacity: 0.85;
  }

  .pcard-comm {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
  }

  .empty {
    display: none;
    text-align: center;
    padding: 80px 0;
    color: var(--muted);
  }

  .empty.show { display: block; }

  /* ── LIGHTBOX ── */
  .lb {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
    backdrop-filter: blur(10px);
  }

  .lb.open { display: flex; }

  .lb-box {
    max-width: 380px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    animation: lbin 0.25s ease;
  }

  @keyframes lbin {
    from { opacity: 0; transform: scale(0.93); }
    to { opacity: 1; transform: scale(1); }
  }

  .lb-circle {
    width: min(280px, 70vw);
    height: min(280px, 70vw);
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid rgba(184,151,90,0.4);
  }

  .lb-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(100%) contrast(1.05);
  }

  .lb-info { text-align: center; }

  .lb-name {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
  }

  .lb-comm {
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 0.05em;
  }

  .lb-nav {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  .lb-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid #333;
    color: var(--text);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    transition: background 0.15s;
  }

  .lb-btn:hover { background: rgba(255,255,255,0.14); }

  .lb-close {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(255,255,255,0.08);
    border: none;
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 20px;
    transition: background 0.15s;
  }

  .lb-close:hover { background: rgba(255,255,255,0.15); }

  /* footer */
  footer {
    border-top: 1px solid #1a1a1a;
    padding: 40px 24px;
    text-align: center;
    color: var(--muted);
  }

  .candle { font-size: 24px; display: block; margin-bottom: 12px; }
  footer strong { color: var(--text); }

  @media (max-width: 500px) {
    #grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 18px 12px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>

  </div>
</section>

<footer>

<!-- LIGHTBOX -->
<div class="lb" id="lb">

</div>

// ── FLOATING CIRCLES ANIMATION ──
const circlesEl = document.getElementById('circles');
const liveNameEl = document.getElementById('live-name');

// Layout: scatter slots across the viewport, avoiding center
const SLOTS = [];
const ROWS = 4, COLS = 6;
const sizes = [90, 110, 80, 100, 95, 85, 105, 90, 115, 80, 95, 100, 88, 102, 92];

function makeSlotsGrid() {
  // create a grid of possible positions, push to the edges away from center
  const W = window.innerWidth, H = window.innerHeight;
  const centerX = W / 2, centerY = H / 2;
  const excluded = { x1: centerX - 260, x2: centerX + 260, y1: centerY - 200, y2: centerY + 200 };

  // Random scattered positions with exclusion zone
  const candidates = [];
  for (let t = 0; t < 200; t++) {
    const sz = sizes[t % sizes.length];
    const x = sz/2 + Math.random() * (W - sz);
    const y = sz/2 + Math.random() * (H - sz);
    // keep away from center
    if (x + sz/2 > excluded.x1 && x - sz/2 < excluded.x2 &&
        y + sz/2 > excluded.y1 && y - sz/2 < excluded.y2) continue;
    candidates.push({x, y, sz});
    if (candidates.length >= 18) break;
  }
  return candidates;
}

let slots = [];

function initCircles() {
  slots = makeSlotsGrid();
  circlesEl.innerHTML = '';
  slots.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'circle-slot';
    el.style.cssText = `width:${s.sz}px;height:${s.sz}px;left:${s.x - s.sz/2}px;top:${s.y - s.sz/2}px`;
    const img = document.createElement('img');
    img.alt = '';
    el.appendChild(img);
    circlesEl.appendChild(el);
  });
}

// Shuffle people
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let queue = shuffle(PEOPLE);
let queueIdx = 0;
let slotAssignments = new Array(18).fill(null); // which person is in each slot

function nextPerson() {
  const p = queue[queueIdx % queue.length];
  queueIdx++;
  if (queueIdx >= queue.length) {
    queue = shuffle(PEOPLE);
    queueIdx = 0;
  }
  return p;
}

function animateSlot(slotIdx) {
  const el = circlesEl.children[slotIdx];
  if (!el) return;
  const img = el.querySelector('img');

  // fade out
  el.classList.remove('visible');

  setTimeout(() => {
    const p = nextPerson();
    slotAssignments[slotIdx] = p;
    img.src = p.image;
    img.onload = () => {
      el.classList.add('visible');
      // show name
      liveNameEl.textContent = p.name + ' — ' + p.community;
      liveNameEl.classList.add('show');
      setTimeout(() => liveNameEl.classList.remove('show'), 2200);
    };
  }, 1600);
}

function startShow() {
  initCircles();
  const n = Math.min(slots.length, circlesEl.children.length);

  // Initial fill: stagger each slot
  for (let i = 0; i < n; i++) {
    setTimeout(() => {
      const el = circlesEl.children[i];
      if (!el) return;
      const p = nextPerson();
      slotAssignments[i] = p;
      const img = el.querySelector('img');
      img.src = p.image;
      img.onload = () => el.classList.add('visible');
    }, i * 220);
  }

  // Cycle: every ~3s pick a random slot and swap it
  setInterval(() => {
    const slotIdx = Math.floor(Math.random() * n);
    animateSlot(slotIdx);
  }, 2800);
}

window.addEventListener('load', () => { setTimeout(startShow, 300); });
window.addEventListener('resize', () => {
  clearTimeout(window._resizeT);
  window._resizeT = setTimeout(() => { initCircles(); startShow(); }, 400);
});

// ── GRID ──
const grid = document.getElementById('grid');
const searchEl = document.getElementById('search');
const resultCountEl = document.getElementById('result-count');
const emptyEl = document.getElementById('empty');
let activeFilter = 'all';
let filteredList = [...PEOPLE];
let lbIdx = 0;

function renderGrid(list) {
  filteredList = list;
  grid.innerHTML = '';
  emptyEl.classList.toggle('show', list.length === 0);
  resultCountEl.textContent = list.length > 0 ? `${list.length} אנשים` : '';
  list.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'pcard';
    card.innerHTML = `
      <div class="pcard-img"><img src="${p.image}" alt="${p.name}" loading="lazy"></div>
      <div class="pcard-name">${p.name}</div>
      <div class="pcard-comm">${p.community}</div>
    `;
    card.addEventListener('click', () => openLb(i));
    grid.appendChild(card);
  });
}

function applyFilter() {
  const q = searchEl.value.trim();
  const list = PEOPLE.filter(p => {
    const matchC = activeFilter === 'all' || p.community === activeFilter;
    const matchQ = !q || p.name.includes(q) || p.community.includes(q);
    return matchC && matchQ;
  });
  renderGrid(list);
}

document.querySelectorAll('.chip').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    activeFilter = c.dataset.c;
    applyFilter();
  });
});
searchEl.addEventListener('input', applyFilter);

// ── LIGHTBOX ──
const lb = document.getElementById('lb');
function openLb(idx) {
  lbIdx = idx;
  updateLb();
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function updateLb() {
  const p = filteredList[lbIdx];
  document.getElementById('lb-img').src = p.image;
  document.getElementById('lb-img').alt = p.name;
  document.getElementById('lb-name').textContent = p.name;
  document.getElementById('lb-comm').textContent = p.community;
}
function closeLb() { lb.classList.remove('open'); document.body.style.overflow = ''; }
document.getElementById('lb-close').addEventListener('click', closeLb);
lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
document.getElementById('lb-prev').addEventListener('click', () => { lbIdx = (lbIdx - 1 + filteredList.length) % filteredList.length; updateLb(); });
document.getElementById('lb-next').addEventListener('click', () => { lbIdx = (lbIdx + 1) % filteredList.length; updateLb(); });
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowRight') document.getElementById('lb-prev').click();
  if (e.key === 'ArrowLeft') document.getElementById('lb-next').click();
});

renderGrid(PEOPLE);
resultCountEl.textContent = `${PEOPLE.length} אנשים`;
</script>
